<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face Capture + QR Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #0f172a;
      color: white;
    }
    video, canvas, img {
      border-radius: 10px;
      margin-top: 10px;
      width: 300px;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
    #qr {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h2>Face Capture → QR Code Generator</h2>

  <video id="video" autoplay></video>
  <br/>
  <button onclick="capture()">Capture Photo</button>

  <canvas id="canvas" style="display:none;"></canvas>

  <h3>Captured Image</h3>
  <img id="photo" />

  <h3>QR Code</h3>
  <div id="qr"></div>

  <script>
    const video = document.getElementById('video');

    // Access webcam
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
      })
      .catch(err => {
        alert('Camera access denied: ' + err);
      });

    function capture() {
      const canvas = document.getElementById('canvas');
      const context = canvas.getContext('2d');

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      context.drawImage(video, 0, 0);

      const dataUrl = canvas.toDataURL('image/png');

      // Show image
      document.getElementById('photo').src = dataUrl;

      // Generate QR (contains base64 image)
      document.getElementById('qr').innerHTML = '';
      QRCode.toCanvas(dataUrl, { width: 200 }, function (err, canvasQR) {
        if (err) console.error(err);
        document.getElementById('qr').appendChild(canvasQR);
      });
    }
  </script>

</body>
</html>
